<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HR Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; }

        .navbar {
            background: #1e3a5f; padding: 14px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .navbar .logo { color: white; font-size: 1.2rem; font-weight: 700; }
        .navbar a { color: #90cdf4; text-decoration: none; font-size: 0.9rem; margin-left: 20px; }

        .page-header {
            background: linear-gradient(135deg, #1e3a5f, #2e86de);
            color: white; text-align: center; padding: 35px 20px;
        }
        .page-header h1 { font-size: 1.8rem; }
        .page-header p  { opacity: 0.85; margin-top: 8px; }

        .container { padding: 35px 30px; max-width: 1100px; margin: auto; }

        .empty-msg {
            text-align: center; padding: 60px; color: #888; font-size: 1rem;
        }

        table {
            width: 100%; border-collapse: collapse;
            background: white; border-radius: 12px;
            overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        thead { background: #1e3a5f; color: white; }
        th { padding: 14px 16px; text-align: left; font-size: 0.85rem;
             font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 13px 16px; font-size: 0.9rem; color: #333;
             border-bottom: 1px solid #f1f5f9; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8faff; }

        .score-pill {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-weight: 700; font-size: 0.85rem;
        }
        .score-high   { background: #d1fae5; color: #065f46; }
        .score-medium { background: #fef3c7; color: #92400e; }
        .score-low    { background: #fee2e2; color: #991b1b; }

        .btn-row { display: flex; gap: 12px; margin-bottom: 25px; }
        .btn {
            padding: 10px 20px; border-radius: 8px; text-decoration: none;
            font-weight: 700; font-size: 0.9rem;
        }
        .btn-green { background: #27ae60; color: white; }
        .btn-blue  { background: #2e86de; color: white; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📄 ResumeScreener</div>
    <div>
        <a href="/">Home</a>
        <a href="/applicant">Apply</a>
        <a href="/hr">HR Panel</a>
        <a href="/dashboard">Dashboard</a>
    </div>
</nav>

<div class="page-header">
    <h1>📋 HR Dashboard</h1>
    <p>All screened resumes sorted by match score</p>
</div>

<div class="container">

    <div class="btn-row">
        <a href="/hr" class="btn btn-green">+ Screen New Resume</a>
        <a href="/"   class="btn btn-blue">🏠 Home</a>
    </div>

    <!-- Empty state -->
    <div class="empty-msg" th:if="${#lists.isEmpty(resumes)}">
        No resumes screened yet. <a href="/hr">Screen your first resume →</a>
    </div>

    <!-- Results table -->
    <table th:if="${!#lists.isEmpty(resumes)}">
        <thead>
            <tr>
                <th>#</th>
                <th>Candidate Name</th>
                <th>Job Title</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Experience</th>
                <th>Skills</th>
                <th>Match Score</th>
                <th>Submitted</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r, stat : ${resumes}">
                <td th:text="${stat.index + 1}"></td>
                <td th:text="${r.candidateName}"></td>
                <td th:text="${r.jobTitle}"></td>
                <td th:text="${r.email}"></td>
                <td th:text="${r.phone}"></td>
                <td th:text="${r.experienceYears} + ' yr(s)'"></td>
                <td th:text="${r.skills != null and #strings.length(r.skills) > 40}
                              ? ${#strings.substring(r.skills, 0, 40)} + '...'
                              : ${r.skills}"></td>
                <td>
                    <span class="score-pill"
                          th:classappend="${r.matchScore >= 70 ? 'score-high' :
                                           r.matchScore >= 40 ? 'score-medium' : 'score-low'}"
                          th:text="${r.matchScore > 0 ? r.matchScore + '%' : 'N/A'}">
                    </span>
                </td>
                <td th:text="${#temporals.format(r.uploadedAt, 'dd MMM yyyy')}"></td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
