<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Applicant - Upload Resume</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; }

        .navbar {
            background: #1e3a5f; padding: 14px 30px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .navbar .logo { color: white; font-size: 1.2rem; font-weight: 700; }
        .navbar a { color: #90cdf4; text-decoration: none; font-size: 0.9rem; margin-left: 20px; }

        .page-header {
            background: linear-gradient(135deg, #1e3a5f, #2e86de);
            color: white; text-align: center; padding: 40px 20px;
        }
        .page-header h1 { font-size: 2rem; }
        .page-header p  { opacity: 0.85; margin-top: 8px; }

        .container {
            display: flex; justify-content: center; padding: 40px 20px;
        }
        .form-card {
            background: white; padding: 40px; border-radius: 16px;
            width: 500px; box-shadow: 0 6px 25px rgba(0,0,0,0.09);
        }
        .form-card h2 { color: #1e3a5f; margin-bottom: 25px; font-size: 1.3rem; }

        label {
            display: block; font-weight: 600;
            color: #444; margin-bottom: 6px; font-size: 0.9rem;
        }
        input[type="text"], input[type="file"] {
            width: 100%; padding: 11px 14px; border-radius: 8px;
            border: 1.5px solid #ddd; margin-bottom: 22px;
            font-size: 0.95rem; transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #2e86de; outline: none; }

        .file-info {
            font-size: 0.8rem; color: #888;
            margin-top: -18px; margin-bottom: 22px;
        }

        .error-box {
            background: #fee2e2; border: 1px solid #fca5a5;
            color: #b91c1c; padding: 12px; border-radius: 8px; margin-bottom: 20px;
        }

        .btn-submit {
            background: #2e86de; color: white; border: none;
            padding: 13px; border-radius: 8px; font-size: 1rem;
            font-weight: 700; cursor: pointer; width: 100%;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #1a6bbf; }

        .back-link {
            display: block; text-align: center;
            margin-top: 18px; color: #666; text-decoration: none; font-size: 0.9rem;
        }
        .back-link:hover { color: #2e86de; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">📄 ResumeScreener</div>
    <div>
        <a href="/">Home</a>
        <a href="/applicant">Apply</a>
        <a href="/hr">HR Panel</a>
    </div>
</nav>

<div class="page-header">
    <h1>👤 Applicant Portal</h1>
    <p>Upload your resume to apply for a position</p>
</div>

<div class="container">
    <div class="form-card">
        <h2>📤 Submit Your Resume</h2>

        <!-- Error message -->
        <div class="error-box" th:if="${error}" th:text="${error}"></div>

        <form action="/resume/submit" method="post" enctype="multipart/form-data">

            <label for="applicantName">Your Full Name</label>
            <input type="text" id="applicantName" name="applicantName"
                   placeholder="e.g. Rahul Sharma" required/>

            <label for="jobTitle">Job Title You're Applying For</label>
            <input type="text" id="jobTitle" name="jobTitle"
                   placeholder="e.g. Java Backend Developer" required/>

            <label for="file">Upload Resume</label>
            <input type="file" id="file" name="file"
                   accept=".pdf,.doc,.docx" required/>
            <p class="file-info">Accepted formats: PDF, DOC, DOCX (Max 10MB)</p>

            <button type="submit" class="btn-submit">🚀 Submit Resume</button>
        </form>

        <a href="/" class="back-link">← Back to Home</a>
    </div>
</div>

</body>
</html>
